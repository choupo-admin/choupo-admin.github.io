<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Choupo">
  <title>Choupo — pure distillation column mark</title>
  <!--
     Pure-process variant: an unmistakable distillation column (no tree at
     all). Zero trademark proximity, but it drops the play on the
     name. Safest option.
  -->
  <defs>
    <linearGradient id="t" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="a" markerWidth="7" markerHeight="7" refX="3.6" refY="3" orient="auto">
      <path d="M0,0 L5,3 L0,6 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <g stroke="#0f766e" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#a)">
    <path d="M18,58 H37.5"/>
    <path d="M48,20 L48,7"/>
    <path d="M52,80 L67,87"/>
  </g>

  <!-- cylindrical column with rounded caps -->
  <rect x="38" y="20" width="20" height="58" rx="3" fill="url(#t)"/>
  <ellipse cx="48" cy="20" rx="10" ry="3.6" fill="#2bd4ee"/>
  <ellipse cx="48" cy="78" rx="10" ry="3.6" fill="#0d9488"/>

  <g stroke="#ffffff" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round">
    <path d="M40,34 H56"/>
    <path d="M40,44 H56"/>
    <path d="M40,54 H56"/>
    <path d="M40,64 H56"/>
  </g>
</svg>

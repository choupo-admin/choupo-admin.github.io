<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Choupo">
  <title>Choupo — column-poplar mark</title>
  <!--
     Double-reading mark: a Lombardy-poplar silhouette (the name: "choupo"
     = poplar, columnar) that is ALSO a distillation column (the
     domain). Trays inside, process streams around it. Teal->cyan, so it
     reads nothing like a generic leaf or green/yellow wordmark.
  -->
  <defs>
    <linearGradient id="t" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="a" markerWidth="7" markerHeight="7" refX="3.6" refY="3" orient="auto">
      <path d="M0,0 L5,3 L0,6 Z" fill="#0f766e"/>
    </marker>
  </defs>

  <!-- process streams: feed in (left), distillate up, bottoms down-right -->
  <g stroke="#0f766e" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#a)">
    <path d="M18,56 H38.5"/>
    <path d="M48,17 V6.5"/>
    <path d="M52,79 L66.5,86.5"/>
  </g>

  <!-- column body = poplar silhouette (straight sides, tapered point) -->
  <path d="M40,80 L40,34 C40,21 43.5,13 48,11.5 C52.5,13 56,21 56,34 L56,80 Z" fill="url(#t)"/>

  <!-- trays / the tree's tiers -->
  <g stroke="#ffffff" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round">
    <path d="M41,42 H55"/>
    <path d="M41,54 H55"/>
    <path d="M41,66 H55"/>
  </g>

  <!-- base / skirt -->
  <rect x="37" y="79" width="22" height="4.5" rx="1.6" fill="#0d9488"/>
</svg>
